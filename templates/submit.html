<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>门店需求提报</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-submit">
  <main class="mobile-shell">
    <section class="page-header">
      <p class="eyebrow">门店需求工单</p>
      <h1>需求提报</h1>
      <p class="subtle">请把问题描述清楚，图片可多选上传。</p>
    </section>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form class="form-panel" method="post" action="/submit" enctype="multipart/form-data">
      <label>
        <span>门店 <strong>*</strong></span>
        <select name="store_name" required>
          <option value="">请选择门店</option>
          {% for store in stores %}
          <option value="{{ store }}" {% if values.get('store_name') == store %}selected{% endif %}>{{ store }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        <span>提报人 <strong>*</strong></span>
        <input name="submitter" type="text" value="{{ values.get('submitter', '') }}" required>
      </label>

      <label>
        <span>需求类型 <strong>*</strong></span>
        <select name="request_type" required>
          <option value="">请选择需求类型</option>
          {% for item in request_types %}
          <option value="{{ item }}" {% if values.get('request_type') == item %}selected{% endif %}>{{ item }}</option>
          {% endfor %}
        </select>
      </label>

      <label>
        <span>紧急程度 <strong>*</strong></span>
        <select name="urgency" required>
          <option value="">请选择紧急程度</option>
          {% for item in urgency_levels %}
          <option value="{{ item }}" {% if values.get('urgency') == item %}selected{% endif %}>{{ item }}</option>
          {% endfor %}
        </select>
      </label>

      <div class="grid-two">
        <label>
          <span>品牌</span>
          <input name="brand" type="text" value="{{ values.get('brand', '') }}" list="brand-options">
          <datalist id="brand-options">
            {% for brand in brands %}
            <option value="{{ brand }}"></option>
            {% endfor %}
          </datalist>
        </label>
        <label>
          <span>商品名称</span>
          <input name="product_name" type="text" value="{{ values.get('product_name', '') }}">
        </label>
      </div>

      <div class="grid-two">
        <label>
          <span>规格条码</span>
          <input name="sku_barcode" type="text" value="{{ values.get('sku_barcode', '') }}">
        </label>
        <label>
          <span>数量</span>
          <input name="quantity" type="number" inputmode="numeric" min="0" step="1" value="{{ values.get('quantity', '') }}">
        </label>
      </div>

      <label>
        <span>问题说明 <strong>*</strong></span>
        <textarea name="description" rows="5" required>{{ values.get('description', '') }}</textarea>
      </label>

      <label>
        <span>图片上传</span>
        <input name="images" type="file" accept="{{ image_accept }}" multiple data-image-input>
      </label>
      <div class="image-preview" data-image-preview></div>

      <label>
        <span>期望完成时间</span>
        <input name="expected_finish_date" type="date" value="{{ values.get('expected_finish_date', '') }}">
      </label>

      <button class="primary-button" type="submit">提交需求</button>
    </form>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
