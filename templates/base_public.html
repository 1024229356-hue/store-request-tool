<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ public_title | default('止痒 ERP') }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v=ui20260704">
</head>
<body class="page-submit">
  <header class="public-topbar">
    <a class="public-brand" href="/query">
      <img class="public-logo-img" src="/static/img/zhiyang-logo.png" alt="止痒商店" onerror="this.style.display='none'">
      <span>
        <strong>止痒 ERP</strong>
        <small>{{ public_section | default('门店工单') }}</small>
      </span>
    </a>
    <nav class="public-actions" aria-label="公开页面导航">
      {% block public_actions %}
      <a class="ghost-button compact" href="/submit">提交工单</a>
      <a class="ghost-button compact" href="/query">查询工单</a>
      <a class="ghost-button compact" href="/schedule">查看排班</a>
      <a class="ghost-button compact" href="/admin/dashboard">后台入口</a>
      {% endblock %}
    </nav>
  </header>

  <main class="{% block main_class %}mobile-shell{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js?v=ui20260704"></script>
</body>
</html>
